      - "检查 %LOCALAPPDATA%\\DeskNote\\state.ini 中各字段值是否正确"
      - "测试菜单 102/103 模式切换，检查 state.ini 中 resident_mode 是否正确更新"
      - "测试关闭后重新启动，presence_state 和 last_floating_* 是否正确恢复"
      - "检查硬编码 240 是否全部替换为基于屏幕宽度的比例值"
    expected: "启动正常，state.ini 读写正确，模式切换和恢复功能正常"
    pass_criteria: "所有手工测试项通过，无异常行为"
    signal: "回复 conductor: M-1 pass"

# ============================================================
# 测试策略
# ============================================================
test_strategy:
  auto:
    - "F-1: 完整 CMake 构建验证"
    - "grep 验证：Config_Get/Config_Set 在 src/app/app.c 中无残留"
    - "grep 验证：config.h 已标记废弃注释"
  manual:
    - "M-1: 运行时功能验证（启动、模式切换、持久化恢复）"

# ============================================================
# GATE 定义
# ============================================================
gates:
  - id: GATE-1
    depends_on: none
    pass_condition: >
      A-1 编译通过 →
      B-1~B-6 全部 Config_Get 替换完毕，编译通过 →
      C-1~C-4 全部 Config_Set 替换完毕，编译通过
    steps_required:
      - A-1
      - B-1 到 B-6
      - C-1 到 C-4
    handover: "agent 通知 conductor GATE-1 状态"

  - id: GATE-2
    depends_on: GATE-1
    pass_condition: >
      D-1~D-3 废弃标记完成 →
      E-1~E-2 硬编码替换完成 →
      F-1 完整编译通过
    steps_required:
      - D-1 到 D-3
      - E-1 到 E-2
      - F-1
    handover: "agent 通知 conductor GATE-2 状态"

  - id: GATE-3
    depends_on: GATE-2
    pass_condition: M-1 全部手工验证通过
    steps_required:
      - M-1
    handover: "人回复 conductor: M-1 pass"

# ============================================================
# 执行规则
# ============================================================
governance:
  pass_condition: >
    GATE-1: 代码编译通过 +
    GATE-2: 废弃标记 + 硬编码替换 + 完整构建 +
    GATE-3: 手工验证全部通过
  handover: "M-1 完成后，人通知 conductor 结果"

