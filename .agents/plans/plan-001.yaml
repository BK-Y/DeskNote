    verify: grep -n "Config_Set" src/app/app.c
    expect: 无匹配（应全部替换为 g_app.global 直接赋值）

  - id: C-2
    executor: agent
    file: src/app/app.c
    action: >
      替换 cmd 102（浮动置顶）中的 Config_Set 调用：
        Config_Set("last_floating_left", rect.left)
          → g_app.global.last_floating_left = rect.left;
