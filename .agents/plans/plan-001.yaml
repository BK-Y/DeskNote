      在 cmd 103 模式切换后调用 App_SaveGlobalState()。
    verify: grep -n "Config_Set" src/app/app.c
    expect: cmd 103 中无 Config_Set

  - id: C-4
    executor: agent
    file: src/app/app.c
    action: >
      在 App_SaveCurrentDocument 中，App_WriteShellStateData 调用后，
      新增 App_SaveGlobalState() 确保全部 DnGlobal 字段持久化。
    verify: grep -n "StateStore_Save" src/app/app.c
    expect: App_SaveGlobalState 内部调 StateStore_Save

  ## ------------------------------------------------------------------
  ## Phase D: config 层废弃标记
  ## ------------------------------------------------------------------
  - id: D-1
    executor: agent
    file: src/config/config.h
    action: >
      在文件顶部添加废弃标记注释：
        /**
         * @deprecated Plan 11 已废弃。
         * 请改用 app.h 中的 DnGlobal 结构体 + g_app.global 直接访问。
         * 不再扩展新字段。保留供旧测试和迁移过渡期使用。
         */
    verify: 无
    expect: 注释标记

  - id: D-2
    executor: agent
    file: src/config/config.c
    action: >
      在文件顶部添加废弃标记注释：同 config.h。
    verify: 无
    expect: 注释标记

  - id: D-3
    executor: agent
    file: src/app/app.c
    action: >
      确认已移除 #include "../config/config.h"。
      确认已移除 Config_Shutdown 调用（App_Shutdown 中，如有）。
    verify: grep -n "config" src/app/app.c
    expect: 只保留注释中提及 config，无实际 include 或调用

  ## ------------------------------------------------------------------
  ## Phase E: 硬编码 240 替换
  ## ------------------------------------------------------------------
  - id: E-1
    executor: agent
    file: src/app/app.c
    action: >
      将所有硬编码 240（用于 dock_thickness / window 宽度默认值）替换为基于 sys 的比例计算：
        dock_thickness 默认值：sys.work_area_right - sys.work_area_left * 15 / 100
        last_floating_width 默认值：sys.screen_width * 15 / 100
      涉及点：
        - App_TryRegisterAppBarFromState: ClampDockThickness 内下限 200 保留
        - OnShellModeChanged: 用 g_app.global.dock_thickness（已有值）
        - App_Init: last_floating_width 默认值 → g_app.sys.screen_width * 15 / 100
        - cmd 103: Config_Set("dock_thickness", 240) → g_app.global.dock_thickness（保留当前值）
    verify: grep -n "240" src/app/app.c
    expect: 仅保留 ClampDockThickness 的 200/500 边界值，无硬编码 240

  - id: E-2
    executor: agent
    file: src/config/config.h
    action: >
      在 CONFIG_DEFAULT_DOCK_THICKNESS 240 和 CONFIG_DEFAULT_WINDOW_WIDTH 240
      旁边添加注释标记为废弃，说明新默认值由 sys 比例计算。
    verify: 无
    expect: 注释标记

  ## ------------------------------------------------------------------
  ## Phase F: 编译验证
  ## ------------------------------------------------------------------
